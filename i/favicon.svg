<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <rect width="1024" height="1024" fill="#0a2638"/>
  <g stroke-linecap="round" stroke-width="46" fill="none">
    <!-- diagonal X: bronze arm (bottom-left to top-right) drawn first -->
    <line x1="346" y1="678" x2="678" y2="346" stroke="#bd8733"/>
    <!-- diagonal X: light-gold arm (top-left to bottom-right) on top -->
    <line x1="346" y1="346" x2="678" y2="678" stroke="#e7c264"/>
    <!-- orthogonal spokes -->
    <line x1="512" y1="242" x2="512" y2="407" stroke="#e7c264"/>
    <line x1="512" y1="617" x2="512" y2="782" stroke="#1c7077"/>
    <line x1="242" y1="512" x2="407" y2="512" stroke="#1c7077"/>
    <line x1="617" y1="512" x2="782" y2="512" stroke="#1c7077"/>
  </g>
</svg>
